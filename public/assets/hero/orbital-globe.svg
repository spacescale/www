<svg viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;width:100%">
<style>
.globe-line{fill:none;stroke:#8B8D94;stroke-width:.5;stroke-dasharray:4 4;opacity:.3}
.globe-outer{fill:none;stroke:#8B8D94;stroke-width:.5;stroke-dasharray:6 6;opacity:.3}
.globe-equator{fill:none;stroke:#8B8D94;stroke-width:.5;stroke-dasharray:4 4;opacity:.3}
.meridian{fill:none;stroke:#8B8D94;stroke-width:.5;stroke-dasharray:4 4;opacity:.2}
.data-line{fill:none;stroke:#66D9A5;stroke-width:.8;stroke-dasharray:3 6;opacity:.4}
.region-node{fill:#66D9A5;opacity:.9}
.region-ring{fill:none;stroke:#66D9A5;stroke-width:.5;opacity:.25}
.lbl{font-family:Inter,system-ui,sans-serif;font-size:10px;fill:#66D9A5;opacity:.7}
.motion-static{display:none}
@media (prefers-reduced-motion: reduce){
  .motion-active{display:none}
  .motion-static{display:inline}
}
</style>

<g transform="translate(340,250)">

<!-- Globe outer ring (static) -->
<ellipse class="globe-outer" cx="0" cy="0" rx="180" ry="180"/>

<!-- Equator (static) -->
<ellipse class="globe-equator" cx="0" cy="0" rx="180" ry="60"/>

<!-- Latitude bands (static) -->
<ellipse class="globe-line" cx="0" cy="0" rx="180" ry="120" transform="rotate(25)"/>
<ellipse class="globe-line" cx="0" cy="0" rx="180" ry="120" transform="rotate(-25)"/>

<!-- Meridians (spinning) — these simulate vertical longitude lines rotating -->
<ellipse class="meridian motion-active" cx="0" cy="0" rx="60" ry="180">
<animate attributeName="rx" values="60;0;60;180;60" dur="20s" repeatCount="indefinite"/>
</ellipse>
<ellipse class="meridian motion-active" cx="0" cy="0" rx="120" ry="180">
<animate attributeName="rx" values="120;60;0;60;120" dur="20s" repeatCount="indefinite"/>
</ellipse>
<ellipse class="meridian" cx="0" cy="0" rx="180" ry="180" style="opacity:.08"/>

<!-- Additional spinning meridians for density -->
<ellipse class="meridian motion-active" cx="0" cy="0" rx="30" ry="180" style="opacity:.1">
<animate attributeName="rx" values="0;30;180;60;0" dur="20s" repeatCount="indefinite"/>
</ellipse>
<ellipse class="meridian motion-active" cx="0" cy="0" rx="90" ry="180" style="opacity:.12">
<animate attributeName="rx" values="60;90;60;0;60" dur="20s" repeatCount="indefinite"/>
</ellipse>
<ellipse class="meridian motion-active" cx="0" cy="0" rx="150" ry="180" style="opacity:.1">
<animate attributeName="rx" values="120;150;60;0;120" dur="20s" repeatCount="indefinite"/>
</ellipse>
<ellipse class="meridian motion-static" cx="0" cy="0" rx="60" ry="180"/>
<ellipse class="meridian motion-static" cx="0" cy="0" rx="120" ry="180"/>
<ellipse class="meridian motion-static" cx="0" cy="0" rx="30" ry="180" style="opacity:.1"/>
<ellipse class="meridian motion-static" cx="0" cy="0" rx="90" ry="180" style="opacity:.12"/>
<ellipse class="meridian motion-static" cx="0" cy="0" rx="150" ry="180" style="opacity:.1"/>

<!-- Vertical axis line (static) -->
<line class="globe-line" x1="0" y1="-180" x2="0" y2="180" opacity=".15"/>
<!-- Horizontal axis line (static) -->
<line class="globe-line" x1="-180" y1="0" x2="180" y2="0" opacity=".15"/>

<!-- Data connections, spread across the abstract globe while preserving regional intent. -->
<line class="data-line" x1="-150" y1="-90" x2="-135" y2="45"><animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/></line>
<line class="data-line" x1="-150" y1="-90" x2="10" y2="-110"><animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/></line>
<line class="data-line" x1="-135" y1="45" x2="135" y2="-40"><animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/></line>
<line class="data-line" x1="135" y1="-40" x2="105" y2="95"><animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/></line>
<line class="data-line" x1="-150" y1="-90" x2="135" y2="-40"><animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/></line>
<line class="data-line" x1="-135" y1="45" x2="105" y2="95"><animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/></line>
<line class="data-line" x1="10" y1="-110" x2="105" y2="95"><animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/></line>

<!-- Region nodes (static positions, pulsing) -->
<g class="node-glow">
<animate attributeName="opacity" values=".35;.85;.35" dur="3s" begin="0s" repeatCount="indefinite"/>
<circle class="region-ring" cx="-150" cy="-90" r="8"/>
<circle class="region-node" cx="-150" cy="-90" r="3"/>
</g>
<g class="node-glow">
<animate attributeName="opacity" values=".35;.85;.35" dur="3s" begin=".6s" repeatCount="indefinite"/>
<circle class="region-ring" cx="-135" cy="45" r="8"/>
<circle class="region-node" cx="-135" cy="45" r="3"/>
</g>
<g class="node-glow">
<animate attributeName="opacity" values=".35;.85;.35" dur="3s" begin="1.2s" repeatCount="indefinite"/>
<circle class="region-ring" cx="10" cy="-110" r="8"/>
<circle class="region-node" cx="10" cy="-110" r="3"/>
</g>
<g class="node-glow">
<animate attributeName="opacity" values=".35;.85;.35" dur="3s" begin="1.8s" repeatCount="indefinite"/>
<circle class="region-ring" cx="135" cy="-40" r="8"/>
<circle class="region-node" cx="135" cy="-40" r="3"/>
</g>
<g class="node-glow">
<animate attributeName="opacity" values=".35;.85;.35" dur="3s" begin="2.4s" repeatCount="indefinite"/>
<circle class="region-ring" cx="105" cy="95" r="8"/>
<circle class="region-node" cx="105" cy="95" r="3"/>
</g>

<!-- Labels -->
<text class="lbl" x="-166" y="-105">ca-east</text>
<text class="lbl" x="-152" y="66">us-east</text>
<text class="lbl" x="-8" y="-124">eu-west</text>
<text class="lbl" x="145" y="-34">ap-south</text>
<text class="lbl" x="118" y="104">au-east</text>
</g>
</svg>
